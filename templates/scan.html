<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a73e8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CylinderScan">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script src="https://unpkg.com/html5-qrcode"></script>
<title>Cylinder Tracking</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  input, select, button {
    padding: 10px;
    margin: 5px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }
  button { cursor: pointer; }
  .row { margin-bottom: 10px; }
  #reader { width: 100% !important; max-width: 500px; }

  /* Success overlay */
  #success-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #1a73e8;
    color: white;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }
  #success-overlay.show { display: flex; }
  #success-overlay .tick { font-size: 80px; margin-bottom: 20px; }
  #success-overlay h2 { font-size: 28px; margin-bottom: 10px; }
  #success-overlay p { font-size: 18px; opacity: 0.9; }
  #success-overlay button {
    margin-top: 30px;
    background: white;
    color: #1a73e8;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    padding: 14px 30px;
    width: auto;
  }
</style>
</head>

<body>

<!-- Success Overlay -->
<div id="success-overlay">
  <div class="tick">✅</div>
  <h2 id="success-title">Submitted!</h2>
  <p id="success-msg"></p>
  <button onclick="resetForm()">New Scan</button>
</div>

<h1>Cylinder Tracking System</h1>

<form id="scan-form">

  <label><b>Driver Name</b></label><br>
  <input type="text" name="driver" placeholder="Enter Driver Name" required>

  <br><br>
  <label><b>Action</b></label><br>
  <select name="action">
    <option value="Delivery">Delivery</option>
    <option value="Collection">Collection</option>
  </select>

  <br><br>
  <h3>QR Scanner</h3>
  <div id="reader"></div>

  <br>
  <h3 id="scan-count">Total Scanned: 0</h3>
  <p id="status-message" style="color:green;font-weight:bold;"></p>

  <div id="cylinder-container">
    <div class="row">
      <input type="text" name="cylinders" placeholder="Cylinder UID">
    </div>
  </div>

  <button type="button" onclick="addCylinder()">+ Add Cylinder</button>

  <br><br>
  <button type="button" id="submit-btn" onclick="submitForm()">Submit</button>

</form>

<script>
function addCylinder() {
  let container = document.getElementById("cylinder-container");
  let div = document.createElement("div");
  div.className = "row";
  div.innerHTML = `<input type="text" name="cylinders" placeholder="Cylinder UID">
    <button type="button" onclick="removeRow(this)">X</button>`;
  container.appendChild(div);
}

function removeRow(button) {
  button.parentElement.remove();
  updateCount();
}

function updateCount() {
  let inputs = document.getElementsByName("cylinders");
  let count = 0;
  for (let i = 0; i < inputs.length; i++) {
    if (inputs[i].value.trim() !== "") count++;
  }
  document.getElementById("scan-count").innerText = "Total Scanned: " + count;
}

function showStatus(message) {
  let el = document.getElementById("status-message");
  el.innerText = message;
  setTimeout(() => { el.innerText = ""; }, 2000);
}

async function submitForm() {
  let form = document.getElementById("scan-form");
  let driver = form.querySelector('[name="driver"]').value.trim();
  if (!driver) { alert("Enter driver name"); return; }

  let cylinders = [...document.getElementsByName("cylinders")]
    .map(i => i.value.trim()).filter(v => v !== "");

  if (cylinders.length === 0) { alert("No cylinders scanned"); return; }

  let btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.innerText = "Submitting...";

  let formData = new FormData();
  formData.append("driver", driver);
  formData.append("action", form.querySelector('[name="action"]').value);
  cylinders.forEach(uid => formData.append("cylinders", uid));

  try {
    let res = await fetch("/submit", { method: "POST", body: formData });
    let text = await res.text();

    // Show success overlay
    document.getElementById("success-title").innerText = "Submitted!";
    document.getElementById("success-msg").innerText =
      cylinders.length + " cylinder(s) saved for " + driver;
    document.getElementById("success-overlay").classList.add("show");

  } catch (err) {
    alert("Error submitting. Check your connection.");
    btn.disabled = false;
    btn.innerText = "Submit";
  }
}

function resetForm() {
  document.getElementById("success-overlay").classList.remove("show");
  document.getElementById("scan-form").reset();
  // Clear all extra cylinder rows, keep just one
  let container = document.getElementById("cylinder-container");
  container.innerHTML = `<div class="row"><input type="text" name="cylinders" placeholder="Cylinder UID"></div>`;
  updateCount();
  let btn = document.getElementById("submit-btn");
  btn.disabled = false;
  btn.innerText = "Submit";
}
</script>

<script>
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
let scanLocked = false;

function onScanSuccess(decodedText) {
  if (scanLocked) return;
  scanLocked = true;

  let inputs = document.getElementsByName("cylinders");
  for (let i = 0; i < inputs.length; i++) {
    if (inputs[i].value === decodedText) {
      showStatus("Already Scanned: " + decodedText);
      setTimeout(() => { scanLocked = false; }, 2000);
      return;
    }
  }

  let container = document.getElementById("cylinder-container");
  let div = document.createElement("div");
  div.className = "row";
  div.innerHTML = `<input type="text" name="cylinders" value="${decodedText}">
    <button type="button" onclick="removeRow(this)">X</button>`;
  container.appendChild(div);

  updateCount();
  beep.play();
  showStatus("✓ Added: " + decodedText);
  setTimeout(() => { scanLocked = false; }, 2000);
}

let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
html5QrcodeScanner.render(onScanSuccess);
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error', e));
  }
</script>

</body>
</html>

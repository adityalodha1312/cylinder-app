<!DOCTYPE html>
<html>

<head>

<title>Customers</title>

<style>

body{
    font-family:Arial;
    margin:20px;
}

input{
    padding:10px;
    margin:5px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
}

</style>

</head>

<body>

<h1>Customers</h1>

<form method="POST" action="/add_customer">

<input
    type="text"
    name="customer"
    placeholder="Customer Name"
    required>

<input
    type="email"
    name="email"
    placeholder="Email"
    required>

<input
    type="text"
    name="phone"
    placeholder="Phone">

<button type="submit">

    Add Customer

</button>

</form>

<br>

<table>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>

</tr>

{% for customer in customers %}

<tr>

<td>{{ customer[0] }}</td>
<td>{{ customer[1] }}</td>
<td>{{ customer[2] }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
